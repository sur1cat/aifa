# AIFA — local orchestration for all microservices + infra.
# Run:   docker compose up -d
# Logs:  docker compose logs -f <service>
#
# Each service also has services/<name>/docker-compose.service.yml
# for running a single service in isolation.

networks:
  aifa:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nats-data:

services:
  # ---- Postgres: one instance, schema-per-service ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aifa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aifa}
      POSTGRES_DB: ${POSTGRES_DB:-aifa}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks: [aifa]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-aifa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Redis: rate limits, JWT blacklist, caches ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks: [aifa]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- NATS: cross-service events (user.deleted, etc.) ----
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    networks: [aifa]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Traefik: api-gateway, routes /api/v1/<domain>/* to services ----
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=aifa_aifa
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.traefik.address=:8090
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "8080:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8090}:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik/dynamic:/etc/traefik/dynamic:ro
    networks: [aifa]
    depends_on:
      - postgres
      - redis
      - nats

  # ---- auth-service ----
  auth-service:
    build: ./services/auth
    image: aifa/auth-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=auth,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: ${JWT_ACCESS_TTL_HOURS:-720}
      JWT_REFRESH_TTL_HOURS: ${JWT_REFRESH_TTL_HOURS:-8760}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-app.aifa.ios}
    ports:
      - "8001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`)
      - traefik.http.routers.auth.entrypoints=web
      - traefik.http.routers.auth.middlewares=strip-api-prefix@file,ratelimit-auth@file,cors@file
      - traefik.http.services.auth.loadbalancer.server.port=8080

  # ---- user-service ----
  user-service:
    build: ./services/user
    image: aifa/user-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=users,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.user.rule=PathPrefix(`/api/v1/users`)
      - traefik.http.routers.user.entrypoints=web
      - traefik.http.routers.user.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.user.loadbalancer.server.port=8080

  # ---- habit-service ----
  habit-service:
    build: ./services/habit
    image: aifa/habit-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=habits,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.habit.rule=PathPrefix(`/api/v1/habits`)
      - traefik.http.routers.habit.entrypoints=web
      - traefik.http.routers.habit.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.habit.loadbalancer.server.port=8080

  # ---- goal-service ----
  goal-service:
    build: ./services/goal
    image: aifa/goal-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=goals,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8004:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.goal.rule=PathPrefix(`/api/v1/goals`)
      - traefik.http.routers.goal.entrypoints=web
      - traefik.http.routers.goal.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.goal.loadbalancer.server.port=8080

  # ---- task-service ----
  task-service:
    build: ./services/task
    image: aifa/task-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=tasks,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.task.rule=PathPrefix(`/api/v1/tasks`)
      - traefik.http.routers.task.entrypoints=web
      - traefik.http.routers.task.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.task.loadbalancer.server.port=8080

  # ---- finance-service (transactions, recurring, savings-goal) ----
  finance-service:
    build: ./services/finance
    image: aifa/finance-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=finance,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.finance.rule=PathPrefix(`/api/v1/transactions`) || PathPrefix(`/api/v1/recurring-transactions`) || PathPrefix(`/api/v1/savings-goal`)
      - traefik.http.routers.finance.entrypoints=web
      - traefik.http.routers.finance.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.finance.loadbalancer.server.port=8080

  # ---- ai-service ----
  ai-service:
    build: ./services/ai
    image: aifa/ai-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8007:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.ai.rule=PathPrefix(`/api/v1/ai`)
      - traefik.http.routers.ai.entrypoints=web
      - traefik.http.routers.ai.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.ai.loadbalancer.server.port=8080

  # ---- notification-service ----
  notification-service:
    build: ./services/notification
    image: aifa/notification-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "${DEBUG:-true}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aifa}:${POSTGRES_PASSWORD:-aifa}@postgres:5432/${POSTGRES_DB:-aifa}?sslmode=disable&search_path=notifications,public
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-app.aifa.ios}
      APNS_PRODUCTION: ${APNS_PRODUCTION:-false}
    ports:
      - "8008:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [aifa]
    labels:
      - traefik.enable=true
      - traefik.http.routers.notification.rule=PathPrefix(`/api/v1/push`)
      - traefik.http.routers.notification.entrypoints=web
      - traefik.http.routers.notification.middlewares=strip-api-prefix@file,ratelimit-general@file,cors@file
      - traefik.http.services.notification.loadbalancer.server.port=8080

  # ---- scheduler-worker (cron NATS publisher; not exposed via Traefik) ----
  scheduler-worker:
    build: ./services/scheduler
    image: aifa/scheduler-worker:dev
    restart: unless-stopped
    environment:
      DEBUG: "${DEBUG:-true}"
      NATS_URL: nats://nats:4222
      CRON_RECURRING: ${CRON_RECURRING:-*/5 * * * *}
      CRON_REMINDERS: ${CRON_REMINDERS:-0 9 * * *}
      HEALTH_ADDR: ":8080"
    depends_on:
      nats:
        condition: service_healthy
    networks: [aifa]
