# Reads env from a sibling .env (see .env.example).
networks:
  aifa:
    external: true
    name: aifa_aifa

services:
  scheduler-worker:
    build: .
    image: aifa/scheduler-worker:dev
    restart: unless-stopped
    env_file: .env
    environment:
      DEBUG: ${DEBUG:-true}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      CRON_RECURRING: ${CRON_RECURRING:-*/5 * * * *}
      CRON_REMINDERS: ${CRON_REMINDERS:-0 9 * * *}
      HEALTH_ADDR: ":${HEALTH_INTERNAL_PORT:-8080}"
    ports:
      - "${HOST_PORT:-8009}:${HEALTH_INTERNAL_PORT:-8080}"
    networks: [aifa]
