name: user-service CI

on:
  push:
    branches: [main]
    paths: ['services/user/**', '.github/workflows/**']
  pull_request:
    paths: ['services/user/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: services/user

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: services/user/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: services/user/go.sum
      - run: CGO_ENABLED=0 go build -ldflags="-w -s" -trimpath -o /tmp/user-service ./cmd/server

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/user
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aifa-user-service:latest
            ghcr.io/${{ github.repository_owner }}/aifa-user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
