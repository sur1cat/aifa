# Reads env from a sibling .env (see .env.example).
networks:
  aifa:
    external: true
    name: aifa_aifa

services:
  user-service:
    build: .
    image: aifa/user-service:dev
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${PORT:-8080}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgres://aifa:aifa@postgres:5432/aifa?sslmode=disable&search_path=users,public}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-secret}
    ports:
      - "${HOST_PORT:-8002}:${PORT:-8080}"
    networks: [aifa]
