# Run auth-service alone, expecting postgres/redis/nats already running
# (e.g. from root `docker compose up -d postgres redis nats`).
#
#   docker compose -f docker-compose.service.yml up --build

networks:
  aifa:
    external: true
    name: aifa_aifa

services:
  auth-service:
    build: .
    image: aifa/auth-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "true"
      DATABASE_URL: postgres://aifa:aifa@postgres:5432/aifa?sslmode=disable&search_path=auth,public
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-secret}
      JWT_ACCESS_TTL_HOURS: "720"
      JWT_REFRESH_TTL_HOURS: "8760"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-app.aifa.ios}
    ports:
      - "8001:8080"
    networks: [aifa]
