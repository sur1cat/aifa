replicaCount: 2

image:
  repository: ghcr.io/sur1cat/aifa-auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  host: api.aifa.app
  path: /api/v1/auth
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

env:
  DEBUG: "false"
  JWT_ACCESS_TTL_HOURS: "720"
  JWT_REFRESH_TTL_HOURS: "8760"
  APPLE_CLIENT_ID: app.aifa.ios

# Secret-backed values. Provide via --set-string or an External Secrets source.
secret:
  create: true
  data:
    DATABASE_URL: ""
    REDIS_ADDR: ""
    REDIS_PASSWORD: ""
    NATS_URL: ""
    JWT_SECRET: ""
    GOOGLE_CLIENT_ID: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
