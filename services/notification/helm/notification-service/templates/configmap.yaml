apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-service.fullname" . }}
  labels: {{- include "notification-service.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.service.targetPort | quote }}
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
