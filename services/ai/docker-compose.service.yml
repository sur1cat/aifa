networks:
  aifa:
    external: true
    name: aifa_aifa

services:
  ai-service:
    build: .
    image: aifa/ai-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "true"
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8007:8080"
    networks: [aifa]
