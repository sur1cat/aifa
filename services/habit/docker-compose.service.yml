networks:
  aifa:
    external: true
    name: aifa_aifa

services:
  habit-service:
    build: .
    image: aifa/habit-service:dev
    restart: unless-stopped
    environment:
      PORT: "8080"
      DEBUG: "true"
      DATABASE_URL: postgres://aifa:aifa@postgres:5432/aifa?sslmode=disable&search_path=habits,public
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long-secret}
    ports:
      - "8003:8080"
    networks: [aifa]
