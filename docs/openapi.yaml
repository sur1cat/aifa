      responses:
        '200':
          description: Parsed command
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ai/categorize:
    post:
      tags: [AI]
      summary: Categorize Expense (Local ML)
      description: |
        Classify a transaction description into a spending category using a local
        SentenceTransformer + LogisticRegression model. Falls back to GPT-4 if
        model confidence is below the per-category threshold.
      operationId: categorizeExpense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 500
                  example: "Яндекс Такси"
      responses:
        '200':
          description: Category result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CategorizeResult'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ai/categorize/batch:
    post:
      tags: [AI]
      summary: Batch Categorize Expenses (Local ML)
      description: Classify up to 100 transaction descriptions in a single request.
      operationId: batchCategorizeExpenses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [texts]
              properties:
                texts:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                  example: ["Пятёрочка", "Яндекс Такси", "Кино Октябрь"]
      responses:
        '200':
          description: List of category results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/CategorizeResult'

  /ai/forecast:
    post:
      tags: [AI]
      summary: Forecast Expenses (Local ML)
      description: |
        Predict future spending per category using Holt-Winters ExponentialSmoothing
        (statsmodels). Falls back to weighted moving average or simple mean for sparse data.
        Returns daily predicted values with 95% confidence intervals.
      operationId: forecastExpenses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactions]
              properties:
                transactions:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/TransactionInput'
                horizon_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                  default: 30
                  example: 30
                ref_date:
                  type: string
                  format: date
                  description: Reference date (default today)
                  example: "2026-04-24"
      responses:
        '200':
          description: Forecast per category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ForecastResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ai/anomalies:
    post:
      tags: [AI]
      summary: Detect Spending Anomalies (Local ML)
      description: |
        Detect anomalous transactions using Modified Z-score (MAD-based, robust to outliers)
        per category, and IsolationForest for unusual total daily spending patterns.
        Sensitivity controls the detection threshold: low=3.0σ, medium=2.5σ, high=2.0σ.
      operationId: detectAnomalies
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactions]
              properties:
                transactions:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/TransactionInput'
                sensitivity:
                  type: string
                  enum: [low, medium, high]
                  default: medium
                  example: medium
      responses:
        '200':
          description: Detected anomalies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AnomalyResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ai/receipt/scan:
    post:
      tags: [AI]
      summary: Scan Receipt (OCR via GPT-4 Vision)
      description: |
        Extract transaction data from a receipt image using GPT-4 Vision.
        Supports JPEG, PNG, WEBP, GIF. Max file size 10 MB.
      operationId: scanReceipt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Extracted receipt data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      amount:
                        type: number
                      currency:
                        type: string
                      date:
                        type: string
                      merchant:
                        type: string
                      category:
                        type: string
                      items:
                        type: array
                        items:
                          type: string
                      confidence:
                        type: number
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ai/voice/transcribe:
    post:
      tags: [AI]
      summary: Transcribe Voice (Whisper + GPT-4 parse)
      description: |
        Transcribe an audio recording using OpenAI Whisper, then parse the transcript
        into a structured transaction via GPT-4. Supports MP3, MP4, WAV, M4A, WEBM.
        Max file size 25 MB.
      operationId: transcribeVoice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                language:
                  type: string
                  default: ru
                  example: ru
      responses:
        '200':
          description: Parsed voice transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      transcript:
                        type: string
                      amount:
                        type: number
                        nullable: true
                      currency:
                        type: string
                        nullable: true
                      category:
                        type: string
                        nullable: true
                      description:
                        type: string
                        nullable: true
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

