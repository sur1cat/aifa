  # ==================== HEALTH ====================
  /health:
    get:
      summary: Health Check
      description: Check API health status
      operationId: healthCheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    idParam:
      name: id
      in: path
      required: true
      description: Resource UUID
      schema:
        type: string
        format: uuid

    limitParam:
      name: limit
      in: query
      description: Number of items per page (max 100)
      schema:
        type: integer
        default: 50
        maximum: 100

    offsetParam:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        default: 0

  responses:
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Invalid or expired token

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: Resource not found

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: VALIDATION_ERROR
              message: Title is required

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INTERNAL_ERROR
              message: Something went wrong

    ServiceUnavailable:
      description: Downstream service unavailable (e.g. OpenAI key not configured or ai-local-service down)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: AI_ERROR
              message: OpenAI API key is not configured

  schemas:
    # ==================== AUTH ====================
    GoogleSignInRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
          description: Google ID token from Sign-In

    AppleSignInRequest:
      type: object
      required: [id_token]
      properties:
        id_token:
          type: string
          description: Apple ID token
        user:
          type: string
          description: User info JSON (only on first sign-in)

    SendOTPRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          example: "+77001234567"

    VerifyOTPRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            tokens:
              $ref: '#/components/schemas/TokenPair'
            is_new_user:
              type: boolean

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    TokenPairResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TokenPair'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
        name:
          type: string
        avatar_url:
          type: string
          format: uri
        auth_provider:
          type: string
          enum: [google, apple, phone]
        created_at:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    # ==================== HABITS ====================
    CreateHabitRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        goal_id:
          type: string
          format: uuid
        icon:
          type: string
          default: "🎯"
        color:
          type: string
          default: green
        period:
          type: string
          enum: [daily, weekly, monthly]
          default: daily
        target_value:
          type: integer
          description: Target for measurable habits
        unit:
          type: string
          description: Unit for target (e.g., pages, minutes)

    UpdateHabitRequest:
      type: object
      properties:
        title:
          type: string
        goal_id:
          type: string
          format: uuid
        icon:
          type: string
        color:
          type: string
        period:
          type: string
          enum: [daily, weekly, monthly]
        target_value:
          type: integer
        unit:
          type: string
        archived_at:
          type: string
          format: date-time
          description: Set to archive, empty string to unarchive

    ToggleCompletionRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
        value:
          type: integer
          description: Progress value for measurable habits

    Habit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        goal_id:
          type: string
          format: uuid
        title:
          type: string
        icon:
          type: string
        color:
          type: string
        period:
          type: string
          enum: [daily, weekly, monthly]
        completed_dates:
          type: array
          items:
            type: string
            format: date
        target_value:
          type: integer
        unit:
          type: string
        progress_values:
          type: object
          additionalProperties:
            type: integer
        streak:
          type: integer
          description: Current streak (calculated by backend)
        created_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time

    # ==================== TASKS ====================
    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 500
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        due_date:
          type: string
          format: date
          description: Defaults to today

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        is_completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        is_completed:
          type: boolean
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    PaginatedTasksResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ==================== TRANSACTIONS ====================
    CreateTransactionRequest:
      type: object
      required: [title, amount, type]
      properties:
        title:
          type: string
          maxLength: 200
        amount:
          type: number
          format: double
          minimum: 0.01
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
          format: date
          description: Defaults to today

    UpdateTransactionRequest:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
          format: date

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    SummaryResponse:
      type: object
      properties:
        income:
          type: number
          format: double
        expense:
          type: number
          format: double
        balance:
          type: number
          format: double

    PaginatedTransactionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ==================== RECURRING TRANSACTIONS ====================
    CreateRecurringRequest:
      type: object
      required: [title, amount, type, frequency]
      properties:
        title:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        frequency:
          type: string
          enum: [weekly, biweekly, monthly, quarterly, yearly]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        remaining_payments:
          type: integer

    UpdateRecurringRequest:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
          format: double
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        frequency:
          type: string
          enum: [weekly, biweekly, monthly, quarterly, yearly]
        start_date:
          type: string
          format: date
        next_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        remaining_payments:
